<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Portal del Paciente DigitHos</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body>

<header>
  <h1>🏥 Portal del Paciente DigitHos</h1>
</header>

<!-- LOGIN -->
<section class="login">
  <select id="pacienteSelect"></select>
  <button onclick="login()">Entrar</button>
</section>

<!-- PANEL PRINCIPAL -->
<section id="panel" class="hidden">

  <div class="perfil">
    <h2 id="nombrePaciente"></h2>
    <p id="infoPaciente"></p>
  </div>

  <div class="alertas">
    <h3>📌 Medicamentos</h3>
    <div id="medicamentos"></div>
  </div>

  <div class="mediciones">
    <h3>📊 Registro de Salud</h3>

    <label>Glucosa:</label>
    <input type="number" id="glucosa">

    <label>Presión arterial:</label>
    <input type="text" id="presion">

    <button onclick="guardarMedicion()">Guardar</button>

    <div id="historial"></div>
  </div>

  <div class="educacion">
    <h3>🎓 Módulo educativo</h3>
    <iframe width="100%" height="250"
      src="https://www.youtube.com/embed/5MgBikgcWnY"
      allowfullscreen>
    </iframe>
  </div>

</section>

<script src="pacientes.js"></script>
<script src="script.js"></script>

</body>
</html>
